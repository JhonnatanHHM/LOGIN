<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio De Sesión</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Formulario De inicio de Sesión -->
         <div id="login-form" class="form-container">
            <h1>Inicio Sesión</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electronico</label>
                    <input type="email" id="email" name="email" required>
                    <div class="erro-message" id="email-errol">Por Favor ingrese Un Correo Válido</div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" required>
                        <span class="toggle-password" id="toggle-password">👁️‍🗨️</span>
                    </div>
                    <div class="error-message" id="password-erro">La Contraseña Debe Tener Almenos 6 Caracteres</div>
                </div>
                <div class="forgot-password">
                    <a href="#" id="forgot-passwordLink">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn">Ingresar</button>
            </form>
            <div class="register-link">
                ¿No tine cuenta? <a href="#" id="registerLink">Regístrate</a>

            </div>
         </div>

        <!-- Formulario De inicio de Registro --> 
          <div id="register-form" class="form-container" style="display: none;">
             <h1>Crear Cuenta</h1>
             <form id="registerForm">
                 <div class="form-group">
                    <label for="reg-name">Nombre Completo</label>

                 </div>
             </form>
          </div>
    </div>
</body>
</html>
